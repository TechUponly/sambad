name: Build Flutter AAB & APK
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: 🔑 Setup Fixed Keystore
        run: |
          mkdir -p ~/.android
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ~/.android/debug.keystore
            echo "Using saved keystore"
          else
            keytool -genkeypair -v -keystore ~/.android/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null
            echo "Generated new keystore"
          fi
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep -E "SHA1|SHA256"
      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
      - name: 🧹 Clean Flutter
        working-directory: ./app_user/frontend
        run: flutter clean
      - name: 📦 Get dependencies
        working-directory: ./app_user/frontend
        run: flutter pub get
      - name: 🔨 Build APK (for testing)
        working-directory: ./app_user/frontend
        run: flutter build apk --release
      - name: 🔨 Build AAB (for Play Store)
        working-directory: ./app_user/frontend
        run: flutter build appbundle --release
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sambad-app-${{ github.run_number }}
          path: app_user/frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
      - name: 📤 Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: sambad-playstore-${{ github.run_number }}
          path: app_user/frontend/build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
