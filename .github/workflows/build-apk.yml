name: Build Flutter AAB & APK
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Fixed Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" > /tmp/ks.txt
            base64 -d /tmp/ks.txt > ~/.android/debug.keystore
          else
            keytool -genkeypair -keystore ~/.android/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug,O=Android,C=US"
          fi
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep -E "SHA1|SHA256"
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
      - name: Clean Flutter
        working-directory: ./app_user/frontend
        run: flutter clean
      - name: Get dependencies
        working-directory: ./app_user/frontend
        run: flutter pub get
      - name: Build APK
        working-directory: ./app_user/frontend
        run: flutter build apk --release
      - name: Build AAB
        working-directory: ./app_user/frontend
        run: flutter build appbundle --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sambad-app-${{ github.run_number }}
          path: app_user/frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: sambad-playstore-${{ github.run_number }}
          path: app_user/frontend/build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
